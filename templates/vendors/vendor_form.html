{% extends 'vendors/base.html' %}

{% block content %}

<header class="page-header">
  <ul class="breadcrumb">
    <li><a href="{% url 'vendor_dashboard' %}"><i class="fa-solid fa-house"></i></a></li>
    <li><span class="separator"><i class="fa-solid fa-chevron-left"></i></span></li>
    <li><span class="current">{{ title }}</span></li>
  </ul>
  <div class="header-actions">
    <a class="chip" href="{% url 'vendor_store' vendor_id %}">عرض المتجر</a>
    <a class="chip" href="{% url 'home' %}">زيارة الموقع</a>
  </div>
</header>

<article class="card pad" aria-label="{{ title|default:'إعدادات المتجر' }}">

  {% if vendor.logo %}
  <div style="margin-bottom: 12px; text-align: center;">
    <img src="{{ vendor.logo.url }}" alt="شعار المتجر" style="width: 100px; height: 100px; object-fit: cover; border-radius: 12px; border: 2px solid var(--border);">
  </div>
  {% endif %}

<form method="post" enctype="multipart/form-data" style="display:grid; gap:10px; margin-top:12px">
    {% csrf_token %}
    
    {% for field in form %}
    <div>
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
            <div style="color: var(--danger); font-size: 12px;">{{ field.errors }}</div>
        {% endif %}
    </div>
    {% endfor %}

    <button class="btn" type="submit">حفظ التغييرات</button>
</form>
</article>

{% endblock %}
