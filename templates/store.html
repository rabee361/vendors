<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>متجر البائع | Marketplace</title>
  <style>
    :root{--bg:#0b1220;--card:#101d36;--muted:#9fb0d0;--text:#eaf0ff;--line:rgba(255,255,255,.10);--accent:#6ea8ff;--shadow:0 18px 50px rgba(0,0,0,.45);--r:18px;--container:1200px}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Tahoma,Arial,sans-serif;background:radial-gradient(900px 450px at 12% 8%, rgba(110,168,255,.18), transparent 60%),var(--bg);color:var(--text)}
    a{color:inherit;text-decoration:none}
    .container{width:min(var(--container),100%);margin-inline:auto;padding:18px}
    header{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0 16px;border-bottom:1px solid var(--line)}
    .brand{display:flex;align-items:center;gap:10px;font-weight:900}
    .mark{width:38px;height:38px;border-radius:14px;background:linear-gradient(135deg, rgba(110,168,255,.95), rgba(57,217,138,.85))}
    .chip{padding:8px 12px;border-radius:999px;border:1px solid var(--line);color:var(--muted);background:rgba(255,255,255,.02)}
    .chip:hover{color:var(--text);border-color:rgba(110,168,255,.35)}
    .hero{margin-top:16px;border:1px solid var(--line);border-radius:calc(var(--r) + 6px);overflow:hidden;background:linear-gradient(180deg, rgba(255,255,255,.03), transparent),rgba(16,29,54,.55);box-shadow:var(--shadow)}
    .hero .pad{padding:18px;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center}
    .muted{color:var(--muted)}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
    .card{border:1px solid var(--line);border-radius:var(--r);background:rgba(16,29,54,.55);box-shadow:0 12px 34px rgba(0,0,0,.22);overflow:hidden}
    .pimg{height:170px;background:linear-gradient(180deg, rgba(255,255,255,.03), transparent),radial-gradient(220px 140px at 30% 30%, rgba(110,168,255,.25), transparent 60%),rgba(11,18,32,.55);border-bottom:1px solid var(--line)}
    .pad{padding:14px}
    .price{font-weight:950}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 12px;border-radius:14px;border:1px solid rgba(110,168,255,.35);background:linear-gradient(135deg, rgba(110,168,255,.22), rgba(57,217,138,.10));font-weight:900}
    .btn:hover{filter:brightness(1.06)}
    @media (max-width:1000px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a class="brand" href="index.html"><span class="mark"></span><span>Marketplace</span></a>
      <div style="display:flex; gap:10px; flex-wrap:wrap">
        <a class="chip" href="vendors.html">البائعون</a>
        <a class="chip" href="index.html#products">المنتجات</a>
      </div>
    </header>

    <section class="hero">
      <div class="pad">
        <div>
          <h1 style="margin:0 0 6px; font-size:22px">TechZone</h1>
          <div class="muted">إلكترونيات • تقييم 4.8 • شحن سريع</div>
        </div>
        <a class="btn" href="index.html#cart">عرض السلة</a>
      </div>
    </section>

    <h2 style="margin:16px 0 6px">منتجات المتجر</h2>
    <p class="muted" style="margin:0; line-height:1.8">هنا تظهر كل منتجات البائع المختار.</p>

    <div class="grid">
      <article class="card">
        <div class="pimg"></div>
        <div class="pad">
          <b>سماعات Pro ANC</b>
          <div class="muted">⭐ 4.7</div>
          <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px">
            <span class="price">$59</span>
            <a class="btn" href="product.html">تفاصيل</a>
          </div>
        </div>
      </article>

      <article class="card">
        <div class="pimg"></div>
        <div class="pad">
          <b>شاحن سريع 30W</b>
          <div class="muted">⭐ 4.9</div>
          <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px">
            <span class="price">$19</span>
            <a class="btn" href="product.html">تفاصيل</a>
          </div>
        </div>
      </article>

      <article class="card">
        <div class="pimg"></div>
        <div class="pad">
          <b>ساعة ذكية S</b>
          <div class="muted">⭐ 4.6</div>
          <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px">
            <span class="price">$79</span>
            <a class="btn" href="product.html">تفاصيل</a>
          </div>
        </div>
      </article>
    </div>
  </div>
</body>
</html>
