<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>البائع | تسجيل/دخول</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <link rel="stylesheet" href="{% static 'css/auth.css' %}">
  <style>
    :root {
      --bg: #0b1220;
      --panel: #0f1a2f;
      --card: #101d36;
      --muted: #9fb0d0;
      --text: #eaf0ff;
      --line: rgba(255, 255, 255, .10);
      --accent: #6ea8ff;
      --accent2: #39d98a;
      --warn: #ffcc66;
      --danger: #ff6b6b;
      --shadow: 0 18px 50px rgba(0, 0, 0, .45);
      --r: 18px;
    }

    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial, sans-serif;
      background:
        radial-gradient(900px 400px at 10% 10%, rgba(110, 168, 255, .18), transparent 60%),
        radial-gradient(700px 380px at 90% 20%, rgba(57, 217, 138, .12), transparent 60%),
        radial-gradient(900px 500px at 40% 90%, rgba(255, 204, 102, .10), transparent 55%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    a {
      color: inherit
    }

    .wrap {
      width: min(1150px, 100%);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--r);
      background: rgba(16, 29, 54, .72);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .head {
      padding: 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(110, 168, 255, .12), rgba(255, 255, 255, .02));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .head b {
      font-size: 16px
    }

    .badge {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(57, 217, 138, .35);
      background: rgba(57, 217, 138, .10);
      color: #c7ffe6;
      font-size: 12px;
      font-weight: 700;
    }

    form {
      padding: 18px
    }

    .grid {
      display: grid;
      gap: 12px
    }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px
    }

    label {
      font-size: 13px;
      color: var(--muted)
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(11, 18, 32, .55);
      color: var(--text);
      outline: none;
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(159, 176, 208, .7)
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(110, 168, 255, .55);
      box-shadow: 0 0 0 4px rgba(110, 168, 255, .10)
    }

    datalist option {
      background: #0b1220;
      color: var(--text)
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(110, 168, 255, .35);
      background: linear-gradient(135deg, rgba(110, 168, 255, .24), rgba(57, 217, 138, .10));
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
    }

    .btn:hover {
      filter: brightness(1.06)
    }

    .btn.ghost {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--muted)
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 6px
    }

    .note {
      margin-top: 12px;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px dashed rgba(255, 255, 255, .14);
      background: rgba(15, 26, 47, .55);
      color: var(--muted);
      line-height: 1.8;
      font-size: 13px;
    }

    @media (max-width: 980px) {
      .wrap {
        grid-template-columns: 1fr
      }
    }
  </style>
</head>

<body>
  <main class="wrap">

    <!-- تسجيل دخول بائع -->
    <section class="panel" aria-label="تسجيل دخول البائع">
      <div class="head">
        <b>تسجيل دخول البائع</b>
        <span class="badge">Seller Portal</span>
      </div>

      <form action="seller-dashboard.html" method="post" class="grid">
        <div>
          <label for="sEmail">البريد الإلكتروني</label>
          <input id="sEmail" name="email" type="email" placeholder="seller@store.com" required />
        </div>

        <div>
          <label for="sPass">كلمة المرور</label>
          <input id="sPass" name="password" type="password" placeholder="••••••••" required />
        </div>

        <div class="actions">
          <button class="btn" type="submit">دخول لوحة البائع</button>
          <a class="btn ghost" href="login.html">العودة للمشتري</a>
        </div>

        <div class="note">
          عند نجاح الدخول كبائع: يوجّهك الـ Backend إلى <b>seller-dashboard.html</b>.
        </div>
      </form>
    </section>

  </main>
</body>

</html>
