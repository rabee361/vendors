{% load static %}
<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Marketplace | الصفحة الرئيسية</title>
  <link rel="stylesheet" href="{% static 'css/hero.css' %}">
  <style>
    :root {
      --bg: #0b1220;
      --panel: #0f1a2f;
      --card: #101d36;
      --muted: #9fb0d0;
      --text: #eaf0ff;
      --line: rgba(255, 255, 255, .10);
      --accent: #6ea8ff;
      --accent2: #39d98a;
      --warn: #ffcc66;
      --danger: #ff6b6b;
      --shadow: 0 18px 50px rgba(0, 0, 0, .45);
      --r: 18px;
      --container: 1200px;
    }

    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial, sans-serif;
      background:
        radial-gradient(900px 450px at 12% 8%, rgba(110, 168, 255, .18), transparent 60%),
        radial-gradient(800px 420px at 88% 18%, rgba(57, 217, 138, .12), transparent 60%),
        radial-gradient(900px 520px at 40% 92%, rgba(255, 204, 102, .10), transparent 55%),
        var(--bg);
      color: var(--text);
    }

    a {
      color: inherit;
      text-decoration: none
    }

    .container {
      width: min(var(--container), 100%);
      margin-inline: auto;
      padding: 0 18px
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(11, 18, 32, .72);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }

    .topbar .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      letter-spacing: .3px;
    }


    
    .mark {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(110, 168, 255, .95), rgba(57, 217, 138, .85));
      box-shadow: 0 14px 32px rgba(110, 168, 255, .18);
    }

    .logo-img {
      width: 70px;
      /* نفس حجم الشريط العلوي */
      height: 70px;
      border-radius: 14px;
      object-fit: cover;
      /* مهم لو الصورة مربعة */
      display: block;
    }

    .quick {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }

    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .02);
      color: var(--muted);
      font-size: 13px;
    }

    .chip:hover {
      color: var(--text);
      border-color: rgba(110, 168, 255, .35)
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center
    }

    .iconbtn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(16, 29, 54, .55);
      color: var(--text);
      font-weight: 700;
      font-size: 13px;
    }

    .iconbtn:hover {
      border-color: rgba(110, 168, 255, .35)
    }

    .counter {
      display: inline-flex;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      background: rgba(110, 168, 255, .18);
      border: 1px solid rgba(110, 168, 255, .35);
    }

    /* Hero */
    .hero {
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: calc(var(--r) + 6px);
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .03), transparent),
        radial-gradient(900px 420px at 18% 20%, rgba(110, 168, 255, .28), transparent 62%),
        radial-gradient(700px 380px at 85% 30%, rgba(57, 217, 138, .18), transparent 60%),
        rgba(16, 29, 54, .55);
      box-shadow: var(--shadow);
    }

    .hero-inner {
      padding: 26px;
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 16px;
      align-items: center;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1.25
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.9
    }

    .search {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .search input {
      flex: 1;
      min-width: 240px;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(11, 18, 32, .55);
      color: var(--text);
      outline: none;
    }

    .search input:focus {
      border-color: rgba(110, 168, 255, .55);
      box-shadow: 0 0 0 4px rgba(110, 168, 255, .10)
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(110, 168, 255, .35);
      background: linear-gradient(135deg, rgba(110, 168, 255, .26), rgba(57, 217, 138, .10));
      color: var(--text);
      font-weight: 800;
      cursor: pointer;
    }

    .btn:hover {
      filter: brightness(1.06)
    }

    .hero-card {
      border: 1px solid var(--line);
      border-radius: var(--r);
      background: rgba(11, 18, 32, .45);
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .hero-metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      background: rgba(16, 29, 54, .55);
    }

    .metric b {
      display: block;
      font-size: 18px
    }

    .metric span {
      color: var(--muted);
      font-size: 12px
    }

    /* Section */
    .section {
      margin-top: 20px
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 18px
    }

    .section-head p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8
    }

    .grid4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px
    }

    .grid3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--r);
      background: rgba(16, 29, 54, .55);
      box-shadow: 0 12px 34px rgba(0, 0, 0, .22);
      overflow: hidden;
    }

    .pad {
      padding: 14px
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, .14);
      background: rgba(255, 255, 255, .03);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .tag.sponsored {
      color: #ffe9b7;
      background: rgba(255, 204, 102, .14);
      border-color: rgba(255, 204, 102, .35);
    }

    .tag.good {
      color: #c7ffe6;
      background: rgba(57, 217, 138, .12);
      border-color: rgba(57, 217, 138, .35);
    }

    /* Category cards */
    .cat {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px;
      background:
        radial-gradient(120px 80px at 20% 30%, rgba(110, 168, 255, .18), transparent 70%),
        rgba(16, 29, 54, .55);
    }

    .cat b {
      display: block
    }

    .cat span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px
    }

    .arrow {
      opacity: .75
    }

    /* Products + filters */
    .shop {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 12px;
      align-items: start;
    }

    .filters {
      position: sticky;
      top: 78px;
      border: 1px solid var(--line);
      border-radius: var(--r);
      background: rgba(16, 29, 54, .55);
      box-shadow: 0 12px 34px rgba(0, 0, 0, .22);
      padding: 14px;
    }

    .filters h3 {
      margin: 0 0 10px;
      font-size: 15px
    }

    .fgroup {
      display: grid;
      gap: 8px;
      margin-bottom: 10px
    }

    label {
      font-size: 13px;
      color: var(--muted)
    }

    input,
    select {
      width: 100%;
      padding: 11px 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(11, 18, 32, .55);
      color: var(--text);
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: rgba(110, 168, 255, .55);
      box-shadow: 0 0 0 4px rgba(110, 168, 255, .10)
    }

    datalist option {
      background: #0b1220;
      color: var(--text)
    }

    .filters .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px
    }

    .small {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7
    }

    .products {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px
    }

    .pimg {
      height: 170px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .03), transparent),
        radial-gradient(200px 120px at 30% 30%, rgba(110, 168, 255, .25), transparent 60%),
        radial-gradient(220px 140px at 70% 40%, rgba(57, 217, 138, .16), transparent 60%),
        rgba(11, 18, 32, .55);
      border-bottom: 1px solid var(--line);
      position: relative;
    }

    .pimg .badge {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid rgba(255, 204, 102, .35);
      background: rgba(255, 204, 102, .14);
      color: #ffe9b7;
    }

    .pmeta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 10px
    }

    .price {
      font-weight: 900
    }

    .muted {
      color: var(--muted)
    }

    .stars {
      color: #ffd27a;
      font-size: 12px;
      letter-spacing: 1px
    }

    .pactions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap
    }

    .btn2 {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, .14);
      background: rgba(255, 255, 255, .03);
      color: var(--text);
      font-weight: 800;
      font-size: 13px;
    }

    .btn2:hover {
      border-color: rgba(110, 168, 255, .35)
    }

    .btn2.primary {
      border-color: rgba(110, 168, 255, .35);
      background: linear-gradient(135deg, rgba(110, 168, 255, .22), rgba(57, 217, 138, .10));
    }

    /* Vendors */
    .vendor {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(110, 168, 255, .35), rgba(57, 217, 138, .18));
      border: 1px solid var(--line);
    }

    .vendor b {
      display: block
    }

    .vendor span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px
    }

    /* About + Contact */
    .two {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 12px;
    }

    textarea {
      min-height: 120px;
      resize: vertical
    }

    /* Footer */
    footer {
      margin-top: 24px;
      border-top: 1px solid var(--line);
      background: rgba(11, 18, 32, .65);
      padding: 18px 0;
    }

    .foot {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.9;
    }

    .foot b {
      color: var(--text)
    }

    .links {
      display: grid;
      gap: 6px
    }

    .links a {
      color: var(--muted)
    }

    .links a:hover {
      color: var(--text)
    }

    /* Overlays via :target (Cart / Favorites) */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .55);
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
      z-index: 99;
    }

    .overlay:target {
      opacity: 1;
      pointer-events: auto
    }

    .drawer {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: min(520px, 100%);
      background: rgba(15, 26, 47, .95);
      border-right: 1px solid var(--line);
      box-shadow: -20px 0 70px rgba(0, 0, 0, .55);
      transform: translateX(-12px);
    }

    .overlay:target .drawer {
      transform: translateX(0)
    }

    .drawer .dhead {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .close {
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: rgba(255, 255, 255, .03);
    }

    .close:hover {
      color: var(--text);
      border-color: rgba(110, 168, 255, .35)
    }

    .drawer .content {
      padding: 14px
    }

    .item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      background: rgba(16, 29, 54, .55);
      margin-bottom: 10px;
    }

    .sum {
      border-top: 1px solid var(--line);
      margin-top: 12px;
      padding-top: 12px;
      display: grid;
      gap: 8px;
      color: var(--muted);
    }

    .sum b {
      color: var(--text)
    }

    .checkout {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    @media (max-width: 1080px) {
      .hero-inner {
        grid-template-columns: 1fr
      }

      .grid4 {
        grid-template-columns: repeat(2, 1fr)
      }

      .grid3 {
        grid-template-columns: 1fr
      }

      .shop {
        grid-template-columns: 1fr
      }

      .filters {
        position: relative;
        top: auto
      }

      .products {
        grid-template-columns: repeat(2, 1fr)
      }

      .two {
        grid-template-columns: 1fr
      }

      .foot {
        grid-template-columns: 1fr
      }
    }

    @media (max-width: 560px) {
      .products {
        grid-template-columns: 1fr
      }

      .quick {
        display: none
      }
    }
  </style>
</head>


<body>

    {% include 'components/topbar.html' %}

    {% block content %}

    {% endblock %}

    {% include 'components/footer.html' %}

</body>

</html>
