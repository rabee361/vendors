<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Noto+Sans+Arabic:wght@100..900&family=Roboto+Slab:wght@100..900&display=swap');

        :root {
            --bg: #0b1220;
            --panel: #0f1a2f;
            --card: #101d36;
            --muted: #9fb0d0;
            --text: #eaf0ff;
            --line: rgba(255, 255, 255, .10);
            --accent: #6ea8ff;
            --accent2: #39d98a;
            --warn: #ffcc66;
            --danger: #ff6b6b;
            --shadow: 0 18px 50px rgba(0, 0, 0, .45);
            --r: 18px;
            --container: 1200px;
            
            --grad-accent: linear-gradient(135deg, rgba(110, 168, 255, .95), rgba(57, 217, 138, .85));
            --grad-btn: linear-gradient(135deg, rgba(110, 168, 255, .26), rgba(57, 217, 138, .10));
            --grad-panel: linear-gradient(180deg, rgba(255, 255, 255, .03), transparent);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: var(--card);
            border-radius: var(--r);
            box-shadow: var(--shadow);
        }
        h1 {
            color: var(--danger);
            font-size: 7rem;
            margin: 0;
        }
        p {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }
        a {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 14px;
            border: 1px solid rgba(110, 168, 255, .35);
            background: var(--grad-btn);
            color: var(--text);
            font-weight: 800;
            text-decoration: none;
        }
        a:hover {
            filter: brightness(1.06);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>Page Not Found</p>
        <a href="/">Go Home</a>
    </div>
</body>
</html>
