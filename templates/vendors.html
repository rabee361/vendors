<title>البائعون | Marketplace</title>
{% extends 'base.html' %}
{% block content %}
  <style>
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 16px
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(110, 168, 255, .35), rgba(57, 217, 138, .18));
      border: 1px solid var(--line)
    }

    @media (max-width:900px) {
      .grid {
        grid-template-columns: 1fr
      }
    }
  </style>
  <div class="container">
    <header>
      <a class="brand" href="index.html"><span class="mark"></span><span>Marketplace</span></a>
      <a class="chip" href="index.html#vendors">العودة</a>
    </header>

    <h1 style="margin:16px 0 6px; font-size:20px">قائمة البائعين</h1>
    <p class="muted" style="margin:0; line-height:1.8">اختر متجرًا لعرض جميع منتجاته.</p>

    <div class="grid">
      <article class="card">
        <div class="row">
          <div style="display:flex; gap:10px; align-items:center">
            <div class="avatar"></div>
            <div><b>TechZone</b>
              <div class="muted">إلكترونيات • تقييم 4.8</div>
            </div>
          </div>
          <a class="btn" href="store.html">عرض المتجر</a>
        </div>
      </article>

      <article class="card">
        <div class="row">
          <div style="display:flex; gap:10px; align-items:center">
            <div class="avatar"></div>
            <div><b>StyleHub</b>
              <div class="muted">أزياء • تقييم 4.5</div>
            </div>
          </div>
          <a class="btn" href="store.html">عرض المتجر</a>
        </div>
      </article>

      <article class="card">
        <div class="row">
          <div style="display:flex; gap:10px; align-items:center">
            <div class="avatar"></div>
            <div><b>Aroma</b>
              <div class="muted">عطور • تقييم 4.9</div>
            </div>
          </div>
          <a class="btn" href="store.html">عرض المتجر</a>
        </div>
      </article>
    </div>
  </div>
{% endblock %}
