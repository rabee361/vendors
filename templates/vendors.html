<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>البائعون | Marketplace</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <style>
    :root {
      --bg: #0b1220;
      --card: #101d36;
      --muted: #9fb0d0;
      --text: #eaf0ff;
      --line: rgba(255, 255, 255, .10);
      --accent: #6ea8ff;
      --shadow: 0 18px 50px rgba(0, 0, 0, .45);
      --r: 18px;
      --container: 1100px
    }

    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial, sans-serif;
      background: radial-gradient(900px 450px at 12% 8%, rgba(110, 168, 255, .18), transparent 60%), var(--bg);
      color: var(--text)
    }

    a {
      color: inherit;
      text-decoration: none
    }

    .container {
      width: min(var(--container), 100%);
      margin-inline: auto;
      padding: 18px
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 10px 0 16px;
      border-bottom: 1px solid var(--line)
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900
    }

    .mark {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(110, 168, 255, .95), rgba(57, 217, 138, .85))
    }

    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: rgba(255, 255, 255, .02)
    }

    .chip:hover {
      color: var(--text);
      border-color: rgba(110, 168, 255, .35)
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 16px
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--r);
      background: rgba(16, 29, 54, .55);
      box-shadow: 0 12px 34px rgba(0, 0, 0, .22);
      padding: 14px
    }

    .muted {
      color: var(--muted)
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(110, 168, 255, .35), rgba(57, 217, 138, .18));
      border: 1px solid var(--line)
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(110, 168, 255, .35);
      background: linear-gradient(135deg, rgba(110, 168, 255, .22), rgba(57, 217, 138, .10));
      font-weight: 900
    }

    .btn:hover {
      filter: brightness(1.06)
    }

    @media (max-width:900px) {
      .grid {
        grid-template-columns: 1fr
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <a class="brand" href="index.html"><span class="mark"></span><span>Marketplace</span></a>
      <a class="chip" href="index.html#vendors">العودة</a>
    </header>

    <h1 style="margin:16px 0 6px; font-size:20px">قائمة البائعين</h1>
    <p class="muted" style="margin:0; line-height:1.8">اختر متجرًا لعرض جميع منتجاته.</p>

    <div class="grid">
      <article class="card">
        <div class="row">
          <div style="display:flex; gap:10px; align-items:center">
            <div class="avatar"></div>
            <div><b>TechZone</b>
              <div class="muted">إلكترونيات • تقييم 4.8</div>
            </div>
          </div>
          <a class="btn" href="store.html">عرض المتجر</a>
        </div>
      </article>

      <article class="card">
        <div class="row">
          <div style="display:flex; gap:10px; align-items:center">
            <div class="avatar"></div>
            <div><b>StyleHub</b>
              <div class="muted">أزياء • تقييم 4.5</div>
            </div>
          </div>
          <a class="btn" href="store.html">عرض المتجر</a>
        </div>
      </article>

      <article class="card">
        <div class="row">
          <div style="display:flex; gap:10px; align-items:center">
            <div class="avatar"></div>
            <div><b>Aroma</b>
              <div class="muted">عطور • تقييم 4.9</div>
            </div>
          </div>
          <a class="btn" href="store.html">عرض المتجر</a>
        </div>
      </article>
    </div>
  </div>
</body>

</html>
